<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IITC Script Distributor</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #222; }
    header { background: #2c3e50; color: #fff; padding: 0.75rem 1.5rem; }
    header a { color: #ecf0f1; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .flash { padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash-saved { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash-pull-started { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
    .flash-pull-busy { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 4px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th { background: #34495e; color: #fff; text-align: left; padding: 0.5rem 0.75rem; font-size: 0.85rem; }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #eee; font-size: 0.88rem; }
    td.url-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #f9f9f9; }
    .missing td { color: #999; text-decoration: line-through; }
    .repo-header { margin: 1.5rem 0 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
    .repo-header h2 { margin: 0; font-size: 1.1rem; }
    .uuid { font-family: monospace; font-size: 0.8rem; color: #666; }
    a { color: #2980b9; }
    button, .btn { padding: 0.3rem 0.75rem; background: #2980b9; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
    button:hover, .btn:hover { background: #1f6391; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #922b21; }
    .override-badge { font-size: 0.75rem; background: #f39c12; color: #fff; border-radius: 3px; padding: 0.1rem 0.35rem; }
    form.inline { display: inline; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 0.4rem 0.5rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: bold; font-size: 0.9rem; }
    .form-group { margin-bottom: 1rem; }
    .form-actions { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
<header><a href="/admin">IITC Script Distributor</a></header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
